<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Sandbox 3D - Fase 3</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; font-family: monospace; user-select: none; }
        #game-canvas { width: 100%; height: 100%; display: block; }
        #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; padding: 20px; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; font-weight: bold; text-shadow: 1px 1px 2px black; }
        #top-info { color: white; background: rgba(0, 0, 0, 0.5); padding: 10px; border-radius: 5px; align-self: flex-start; pointer-events: auto; }
        #survival-status { display: flex; gap: 10px; margin-top: 5px; }
        .status-bar { background: #333; width: 150px; height: 15px; border: 2px solid #fff; border-radius: 3px; overflow: hidden; }
        #hp-fill { background: #ff3333; width: 100%; height: 100%; transition: width 0.2s; }
        #hotbar-container { align-self: center; margin-bottom: 20px; background: rgba(0, 0, 0, 0.6); padding: 6px; border-radius: 5px; display: flex; gap: 5px; pointer-events: auto; border: 2px solid #333; }
        .hotbar-slot { width: 40px; height: 40px; background: #555; border: 2px solid #888; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px; position: relative; }
        .hotbar-slot.active { border-color: #fff; background: #777; box-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
        .slot-count { position: absolute; bottom: 2px; right: 4px; font-size: 10px; }
        #instructions { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; text-align: center; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(139,0,0,0.9); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; font-size: 24px; }
        #respawn-btn { margin-top: 20px; padding: 10px 20px; font-size: 18px; cursor: pointer; font-family: monospace; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="hud">
        <div id="top-info">
            <div id="debug-coords">Pos: X: 0, Y: 0, Z: 0</div>
            <div id="debug-time">Hora: 12:00</div>
            <div id="survival-status">
                Vida: <div class="status-bar"><div id="hp-fill"></div></div>
            </div>
        </div>
        <div id="crosshair">+</div>
        <div id="hotbar-container">
            <div class="hotbar-slot active" data-index="0">🌿<span class="slot-count">64</span></div>
            <div class="hotbar-slot" data-index="1">🟫<span class="slot-count">64</span></div>
            <div class="hotbar-slot" data-index="2">🪨<span class="slot-count">64</span></div>
            <div class="hotbar-slot" data-index="3">🪵<span class="slot-count">64</span></div>
        </div>
    </div>
    <div id="instructions">
        <h1>CLIQUE PARA JOGAR</h1>
        <p>WASD (Mover) | Espaço (Pular)<br>Clique Esquerdo (Minerar) | Direito (Construir)</p>
    </div>
    <div id="game-over">
        <h1>VOCÊ MORREU!</h1>
        <button id="respawn-btn">Renascer</button>
    </div>
    <script type="module" src="game.js"></script>
</body>
</html>
