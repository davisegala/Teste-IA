<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Sandbox 3D - Modular & Atualizado</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0b101d; font-family: monospace; }
        #game-canvas { display: block; width: 100%; height: 100%; }

        #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255, 255, 255, 0.9); font-size: 24px; font-weight: bold; }
        #ui-overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 12px; border-radius: 4px; pointer-events: auto; font-size: 13px; line-height: 1.4; width: 290px; border: 1px solid #444; }
        #block-info { margin-top: 5px; font-size: 12px; color: #aaa; }

        #health-bar { margin-top: 8px; width: 100%; background: #441111; border: 1px solid #ff3333; height: 14px; border-radius: 2px; overflow: hidden; position: relative; }
        #health-fill { background: #ff3333; width: 100%; height: 100%; transition: width 0.2s; }
        #health-text { position: absolute; width: 100%; text-align: center; font-size: 10px; top: 0; font-weight: bold; color: #fff; line-height: 12px; }

        #hotbar-container { align-self: center; margin-bottom: 10px; background: rgba(0, 0, 0, 0.7); padding: 4px; border: 2px solid #333; border-radius: 4px; display: flex; gap: 4px; pointer-events: auto; }
        .hotbar-slot { width: 44px; height: 44px; background: #8b8b8b; border: 2px solid #3c3c3c; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; color: #fff; font-weight: bold; font-size: 11px; }
        .hotbar-slot.selected { border: 3px solid #ffffff; background: #ababab; }
        .slot-icon { width: 22px; height: 22px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .slot-count { position: absolute; bottom: 1px; right: 3px; font-size: 10px; text-shadow: 1px 1px 1px #000; }

        .hidden { display: none !important; }

        /* MODAIS */
        #inventory-modal, #campfire-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 50; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .inv-box { background: #2b2b2b; border: 3px solid #555; border-radius: 6px; padding: 16px; width: 420px; color: #fff; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        .inv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; color: #ffeb3b; }
        .inv-header button { background: #555; color: #fff; border: 1px solid #777; border-radius: 3px; width: 26px; height: 26px; cursor: pointer; }
        
        .inv-section-title { font-size: 11px; color: #999; margin: 8px 0 4px 0; text-transform: uppercase; letter-spacing: 1px; }
        .inv-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; }
        .inv-slot, .craft-result-slot { width: 40px; height: 40px; background: #444; border: 2px solid #222; border-radius: 3px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .inv-slot:hover, .craft-result-slot:hover { border-color: #ffeb3b; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js" } }
    </script>
</head>
<body>

    <canvas id="game-canvas"></canvas>
    
    <div id="hud">
        <div id="ui-overlay">
            <div><strong>Voxel Sandbox 3D Modular</strong></div>
            <div id="health-bar">
                <div id="health-fill"></div>
                <div id="health-text">HP: 20 / 20</div>
            </div>
            <div style="margin-top: 5px;"><strong>Tempo:</strong> <span>Dia</span></div>
        </div>

        <div id="crosshair">+</div>

        <div id="hotbar-container">
            <div class="hotbar-slot selected" data-index="0"></div>
            <div class="hotbar-slot" data-index="1"></div>
            <div class="hotbar-slot" data-index="2"></div>
            <div class="hotbar-slot" data-index="3"></div>
            <div class="hotbar-slot" data-index="4"></div>
            <div class="hotbar-slot" data-index="5"></div>
            <div class="hotbar-slot" data-index="6"></div>
            <div class="hotbar-slot" data-index="7"></div>
            <div class="hotbar-slot" data-index="8"></div>
        </div>
    </div>

    <div id="inventory-modal" class="hidden">
        <div class="inv-box">
            <div class="inv-header">
                <span>Inventário Geral</span>
                <button id="btn-close-inv">X</button>
            </div>
            <div class="inv-section-title">Hotbar</div>
            <div class="inv-grid" id="inv-hotbar-grid"></div>
        </div>
    </div>

    <div id="campfire-modal" class="hidden">
        <div class="inv-box">
            <div class="inv-header">
                <span>🔥 Fogueira (Fundição)</span>
                <button id="btn-close-campfire">X</button>
            </div>
            <div style="display: flex; justify-content: center; align-items: center; gap: 24px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 4px; margin-bottom: 12px;">
                <div style="display: flex; flex-direction: column; gap: 8px; align-items: center;">
                    <div class="inv-slot" id="campfire-input-slot" title="Minério Cru"></div>
                    <div id="campfire-fire-icon" style="font-size: 20px; transition: opacity 0.2s;">🔥</div>
                    <div class="inv-slot" id="campfire-fuel-slot" title="Combustível"></div>
                </div>
                <div style="font-size: 24px; color: #ffeb3b;">➔</div>
                <div class="craft-result-slot" id="campfire-output-slot" style="width: 48px; height: 48px;" title="Resultado"></div>
            </div>
            <div class="inv-section-title">Seus Itens Rápidos (Clique para transferir)</div>
            <div class="inv-grid" id="campfire-player-inv"></div>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
